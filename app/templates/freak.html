<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Freak</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      .freak-screen {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        display: block;
      }
    </style>
  </head>
  <body>
    <img class="freak-screen" src="/static/OLEGFREAK.png" alt="Freak easter egg" />
    <audio id="freak-audio" autoplay loop>
      <source src="/static/Shaman King.mp3" type="audio/mpeg" />
    </audio>
    <script>
      const freakAudio = document.getElementById('freak-audio');
      if (freakAudio) {
        const tryPlay = () => {
          void freakAudio.play().catch(() => {});
        };
        tryPlay();
        document.addEventListener('click', tryPlay, { once: true });
        document.addEventListener('keydown', tryPlay, { once: true });
      }
    </script>
  </body>
</html>
