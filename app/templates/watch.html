{% extends "base.html" %}
{% block content %}
<h2>{{ tr('watch_title') }}</h2>
<p class="text-secondary">{{ tr('watch_description') }}</p>

<div class="ratio ratio-16x9 neon-border-blue rounded overflow-hidden" style="min-width: 400px; min-height: 300px;">
  {% if twitch_embed_mode == "interactive" %}
  <div id="twitch-embed" style="min-width: 400px; min-height: 300px;"></div>
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
    new Twitch.Player("twitch-embed", {
      width: "100%",
      height: "100%",
      channel: "{{ twitch_channel|e }}",
      parent: [{% for parent in twitch_embed_parents %}"{{ parent|e }}"{% if not loop.last %}, {% endif %}{% endfor %}],
      autoplay: {{ 'true' if twitch_autoplay else 'false' }},
      muted: {{ 'true' if twitch_muted else 'false' }}
    });
  </script>
  {% else %}
  <iframe
    src="https://player.twitch.tv/?channel={{ twitch_channel|urlencode }}{% for parent in twitch_embed_parents %}&parent={{ parent|urlencode }}{% endfor %}&autoplay={{ 'true' if twitch_autoplay else 'false' }}&muted={{ 'true' if twitch_muted else 'false' }}"
    allowfullscreen="true"
    scrolling="no"
    frameborder="0"
    title="Twitch stream {{ twitch_channel }}"
    style="min-width: 400px; min-height: 300px;"
  ></iframe>
  {% endif %}
</div>
{% endblock %}
