<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ tr('title') }}</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Orbitron:wght@500;700;800&family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-dark text-light">
<div class="matrix-rain matrix-rain--left" aria-hidden="true">
  <span class="matrix-rain__stream"></span>
  <span class="matrix-rain__stream"></span>
  <span class="matrix-rain__stream"></span>
  <span class="matrix-rain__stream"></span>
</div>
<div class="matrix-rain matrix-rain--right" aria-hidden="true">
  <span class="matrix-rain__stream"></span>
  <span class="matrix-rain__stream"></span>
  <span class="matrix-rain__stream"></span>
  <span class="matrix-rain__stream"></span>
</div>
<nav class="navbar navbar-expand-lg navbar-dark neon-border-blue mb-4 navbar-neon">
  <div class="container">
    <a class="navbar-brand nav-main-link neon-title neon-title--logo" href="/">DAC Tournament</a>
    <div class="d-flex gap-3">
      <a href="/participants" class="nav-link nav-main-link">{{ tr('nav_participants') }}</a>
      <a href="/tournament" class="nav-link nav-main-link">{{ tr('nav_tournament') }}</a>
      <a href="/donate" class="nav-link nav-main-link">{{ tr('nav_donate') }}</a>
      <a href="/rules" class="nav-link nav-main-link">{{ tr('nav_rules') }}</a>
      <a href="/archive" class="nav-link nav-main-link">{{ tr('nav_archive') }}</a>
      <a href="/set-lang/en" class="btn btn-sm btn-neon btn-neon-cyan">{{ tr('base_lang_en') }}</a>
      <a href="/set-lang/ru" class="btn btn-sm btn-neon btn-neon-pink">{{ tr('base_lang_ru') }}</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<footer class="site-footer mt-auto">
  <div class="container site-footer__inner">
    <span>For the community, with ❤️, by</span>
    <a class="site-footer__author" href="https://t.me/arbelin94" target="_blank" rel="noopener noreferrer">Arbelin</a>
  </div>
</footer>
</body>
</html>
