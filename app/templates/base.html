<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ tr('title') }}</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-dark text-light">
<nav class="navbar navbar-expand-lg navbar-dark neon-border-blue mb-4 navbar-neon">
  <div class="container">
    <a class="navbar-brand nav-main-link neon-title neon-title--logo" href="/">DAC Tournament</a>
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#main-navbar" aria-controls="main-navbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="main-navbar">
      <ul class="navbar-nav ms-auto mb-3 mb-lg-0 align-items-lg-center gap-lg-2">
        <li class="nav-item"><a href="/participants" class="nav-link nav-main-link px-lg-2">{{ tr('nav_participants') }}</a></li>
        <li class="nav-item"><a href="/tournament" class="nav-link nav-main-link px-lg-2">{{ tr('nav_tournament') }}</a></li>
        <li class="nav-item"><a href="/donate" class="nav-link nav-main-link px-lg-2">{{ tr('nav_donate') }}</a></li>
        <li class="nav-item"><a href="/rules" class="nav-link nav-main-link px-lg-2">{{ tr('nav_rules') }}</a></li>
        <li class="nav-item"><a href="/archive" class="nav-link nav-main-link px-lg-2">{{ tr('nav_archive') }}</a></li>
      </ul>
      <div class="d-grid d-lg-flex gap-2 ms-lg-3">
        <a href="/set-lang/en" class="btn btn-sm btn-neon btn-neon-cyan">{{ tr('base_lang_en') }}</a>
        <a href="/set-lang/ru" class="btn btn-sm btn-neon btn-neon-pink">{{ tr('base_lang_ru') }}</a>
      </div>
    </div>
  </div>
</nav>
<div class="page-content-shell">
  <div class="page-content-shell__matrix" aria-hidden="true">
    <div class="matrix-rain" data-matrix-scope="ambient"></div>
  </div>
  <main class="container pb-5 page-content-shell__main">
    {% block content %}{% endblock %}
  </main>
</div>
<footer class="site-footer mt-auto">
  <div class="container site-footer__inner">
    <span>For the community, with ❤️, by</span>
    <a class="site-footer__author" href="https://t.me/arbelin94" target="_blank" rel="noopener noreferrer">Arbelin</a>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(() => {
  const rainLayers = Array.from(document.querySelectorAll('.matrix-rain'));
  if (!rainLayers.length) {
    return;
  }

  const mobileQuery = window.matchMedia('(max-width: 991.98px)');
  const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

  const randomBinary = (length) => Array.from({ length }, () => (Math.random() > 0.5 ? '1' : '0')).join('');

  const renderRainLayer = (layer) => {
    layer.replaceChildren();

    if (reducedMotionQuery.matches) {
      layer.classList.add('matrix-rain--reduced');
      return;
    }

    layer.classList.remove('matrix-rain--reduced');

    const width = layer.clientWidth || layer.parentElement?.clientWidth || 320;
    const minColumns = mobileQuery.matches ? 4 : 10;
    const maxColumns = mobileQuery.matches ? 9 : 18;
    const widthDerived = Math.floor(width / (mobileQuery.matches ? 62 : 48));
    const columnsCount = Math.min(maxColumns, Math.max(minColumns, widthDerived + Math.floor(Math.random() * 3)));

    for (let i = 0; i < columnsCount; i += 1) {
      const column = document.createElement('span');
      column.className = 'matrix-rain__column';
      column.textContent = randomBinary(Math.floor(Math.random() * 24) + 24);

      const left = columnsCount === 1 ? 50 : (i / (columnsCount - 1)) * 100;
      const opacity = 0.1 + Math.random() * 0.3;
      const duration = 6 + Math.random() * 7;
      const delay = -Math.random() * duration;
      const fontSize = (mobileQuery.matches ? 0.66 : 0.72) + Math.random() * 0.28;

      column.style.left = `${left}%`;
      column.style.opacity = opacity.toFixed(2);
      column.style.animationDuration = `${duration.toFixed(2)}s`;
      column.style.animationDelay = `${delay.toFixed(2)}s`;
      column.style.fontSize = `${fontSize.toFixed(2)}rem`;

      layer.appendChild(column);
    }
  };

  const initRain = () => {
    rainLayers.forEach(renderRainLayer);
  };

  let resizeTimer = null;
  const onResize = () => {
    window.clearTimeout(resizeTimer);
    resizeTimer = window.setTimeout(initRain, 180);
  };

  window.addEventListener('resize', onResize, { passive: true });
  reducedMotionQuery.addEventListener('change', initRain);
  mobileQuery.addEventListener('change', initRain);
  initRain();
})();
</script>
</body>
</html>
